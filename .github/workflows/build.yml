# .github/workflows/build.yml
#
# Build and Release workflow for License Manager X
#
# - Trigger on push to any branch, on version tags (e.g., v1.2.3), or on manual dispatch.
# - Using a version tag will signal an MSIX build for the MS Store and a standalone EXE build.
# - If a version tag (e.g., v1.2.3) is pushed, create a GitHub release for that version if not already present.
# - If the version tag is not on the 'main' branch, mark the GitHub release as 'draft'.
# - Build and publish the NuGet package to NuGet.org only if the version tag is on the main branch.
# - Manual dispatch builds the project but does not create a GitHub release or publish to NuGet.

name: Build and Release

on:
  push:
    branches: [ '**' ]
    tags:
      - 'v*' # Match version tags like v1.2.3
    paths-ignore:
      - '**/*.gitignore'
      - '**/*.gitattributes'
      - '**/*.md'
      - 'LICENSE'
  pull_request:
    branches: [ main, yaml ]
    paths-ignore:
      - '**/*.gitignore'
      - '**/*.gitattributes'
      - '**/*.md'
      - 'LICENSE'
  workflow_dispatch:

env:
  # Paths to the project files relative to the root of the project
  PROJECT_APP_PATH:         LicenseManagerX\LicenseManagerX.csproj
  PROJECT_TESTS_PATH:       LicenseManagerX.UnitTests\LicenseManagerX.UnitTests.csproj
  PROJECT_WAP_PATH:         LicenseManagerX.Package\LicenseManagerX.Package.wapproj
  PROJECT_MANIFEST_PATH:    LicenseManagerX.Package\Package.appxmanifest
  DIRECTORY_BUILD_PROPS:    .\Directory.Build.props
  DIRECTORY_PACKAGES_PROPS: .\Directory.Packages.props

  # Solution-specific files
  NUGET_PACKAGE_NAME:    LicenseManager_12noon.Client
  PROJECT_NUGET_PATH:    LicenseManager_12noon.Client\LicenseManager_12noon.Client.csproj
  PROJECT_CONSOLE_PATH:  LicenseManagerX.Console\LicenseManagerX.Console.csproj
  PROJECT_EXAMPLE_PATH:  LicenseManagerX_Example\LicenseManagerX_Example.csproj
  LICENSE_FILE_PATH:     LicenseManagerX_Example\LicenseManagerX_Example.lic
  PRIVATE_FILE_PATH:     LicenseManagerX_Example\Secret\LicenseManagerX_Example.private

  # Configuration type to build.
  # You can convert this to a build matrix if you need coverage of multiple configuration types.
  # https://docs.github.com/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
  BUILD_CONFIGURATION: Release

  # Local Action constants
  ARTIFACT_NAME: LicenseManagerX
  ARTIFACT_PACKAGE: package-licensemanagerx
  PUBLISH_FILES_PATH:       ${{ github.workspace }}\release
  PUBLISH_FILES_PATH_LINUX: ${{ github.workspace }}/release

concurrency:
  group: licensemanagerx-${{ github.event_name }}
  cancel-in-progress: true

# Jobs are run in parallel unless `needs` is specified.
# https://docs.github.com/en/actions/learn-github-actions/managing-complex-workflows#creating-dependent-jobs
jobs:
  build:
    name: 🏗 Build and test
    # TODO: Change back when Windows 2025 with VS2026 is available. (4 May 2026)
    #runs-on: windows-latest
    runs-on: windows-2025-vs2026
    permissions:
      contents: read

    steps:
      - name: 🗒️ Output variables
        run: |
          echo "🚀 Building..."
          echo "GITHUB_SHA: ${{ github.sha }}"
          echo "GITHUB_REF: ${{ github.ref }}"
          echo "GITHUB_REF_NAME: ${{ github.ref_name }}"
          echo "GITHUB_REF_TYPE: ${{ github.ref_type }}"
          echo "GITHUB_EVENT_NAME: ${{ github.event_name }}"
          echo "GITHUB_EVENT_BASEREF: ${{ github.event.base_ref }}"
          echo "GITHUB_EVENT_COMMIT_MSG: ${{ github.event.head_commit.message }}"
          #export GITHUB_REF_TYPE="${{ github.ref_type }}"

      # https://docs.github.com/en/actions/reference/workflows-and-actions/reusing-workflow-configurations#yaml-anchors-and-aliases
      - &step_checkout
        name: 🧾 Check out repository
        uses: actions/checkout@v6

      - &step_compare_versions
        name: 🔎 Compare app versions in props and manifest
        shell: pwsh
        run: |
          # 1. Read VersionPrefix from Directory.Build.props
          [xml]$props = Get-Content "${{ env.DIRECTORY_BUILD_PROPS }}"
          $versionPrefix = ([string]$props.Project.PropertyGroup.VersionPrefix).Trim()
          if ([string]::IsNullOrWhiteSpace($versionPrefix))
          {
            throw "VersionPrefix not found in ${{ env.DIRECTORY_BUILD_PROPS }}"
          }

          # 2. Read package version from Directory.Packages.props
          [xml]$pkgProps = Get-Content "${{ env.DIRECTORY_PACKAGES_PROPS }}"
          $pkgNode = $pkgProps.Project.ItemGroup.PackageVersion |
            Where-Object { $_.Include -eq "LicenseManager_12noon.Client" }

          if (-not $pkgNode)
          {
            throw "PackageVersion entry for LicenseManager_12noon.Client not found in ${{ env.DIRECTORY_PACKAGES_PROPS }}"
          }

          $packageVersion = ([string]$pkgNode.Version).Trim()
          if ([string]::IsNullOrWhiteSpace($packageVersion))
          {
            throw "Version attribute missing for LicenseManager_12noon.Client in ${{ env.DIRECTORY_PACKAGES_PROPS }}"
          }

          # 3. Read manifest Identity.Version
          [xml]$manifest = Get-Content "${{ env.PROJECT_MANIFEST_PATH }}"
          $manifestVersion = ([string]$manifest.Package.Identity.Version).Trim()
          if ([string]::IsNullOrWhiteSpace($manifestVersion))
          {
            throw "Identity.Version not found in ${{ env.PROJECT_MANIFEST_PATH }}"
          }

          # 4. Normalize to 4-part versions
          $expected = "$versionPrefix.0"
          $expectedPackage = "$packageVersion.0"

          # 5. Compare manifest version
          if (($manifestVersion -ne $expected) -or ($expectedPackage -ne $expected))
          {
            throw "Version mismatch: Directory.Build.props: $versionPrefix | Directory.Packages.props: $packageVersion | Package.appxmanifest: $manifestVersion"
          }

          Write-Host "Version check successful:"
          Write-Host "  Directory.Build.props:    $versionPrefix"
          Write-Host "  Directory.Packages.props: $packageVersion"
          Write-Host "  Package.appxmanifest:     $manifestVersion"

      - &step_setup_dotnet
        name: 🛠️ Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          # The NuGet package supports .NET 8, 9, and 10.
          # setup-dotnet will handle installing all required SDKs.
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
          dotnet-quality: ga
          global-json-file: global.json

      - &step_setup_msbuild
        name: 🧰 Set up MSBuild
        uses: microsoft/setup-msbuild@v3
        with:
          msbuild-architecture: x64
          vs-version: '[18.0,19.0)'

      # RID added for MSBuild of MSIX
      # "Without --runtime win-x64, dotnet restore only downloads packages
      # needed for the current "Any CPU" / generic target.
      # It doesn't download platform-specific runtime packs.
      # Adding --runtime win-x64 to the restore command tells
      # NuGet upfront to download the platform-specific runtime
      # packs so they're available when the publish step runs."
      - &step_restore_nuget
        name: 📦 Restore NuGet packages
        run: |
          dotnet restore "${{ env.PROJECT_APP_PATH }}"     --runtime win-x64
          dotnet restore "${{ env.PROJECT_TESTS_PATH }}"
          dotnet restore "${{ env.PROJECT_NUGET_PATH }}"
          dotnet restore "${{ env.PROJECT_CONSOLE_PATH }}" --runtime win-x64

      # Build NuGet package for all <TargetFrameworks>: .NET 8, 9, and 10
      - name: 🧩 Build NuGet package
        run: |
          dotnet build `
            "${{ env.PROJECT_NUGET_PATH }}" `
            --configuration ${{ env.BUILD_CONFIGURATION }} `
            --no-restore

      - name: 🪟 Build application
        run: |
          dotnet build `
            "${{ env.PROJECT_APP_PATH }}" `
            --configuration ${{ env.BUILD_CONFIGURATION }} `
            --no-restore

      # Only build Example application if this is NOT a release tag.
      # A release requires the Example app's NuGet dependency version to be pre-bumped, so
      # it cannot restore from NuGet.org until the package is published later in the workflow.
      - name: 📙️ Build Example Client application
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          dotnet restore `
            "${{ env.PROJECT_EXAMPLE_PATH }}" `
            --runtime win-x64
          dotnet build `
            "${{ env.PROJECT_EXAMPLE_PATH }}" `
            --configuration ${{ env.BUILD_CONFIGURATION }} `
            --no-restore

      - name: 📟️ Build Console application
        run: |
          dotnet build `
            "${{ env.PROJECT_CONSOLE_PATH }}" `
            --configuration ${{ env.BUILD_CONFIGURATION }} `
            --no-restore

      - name: 🏗 Build unit tests
        run: |
          dotnet build `
            "${{ env.PROJECT_TESTS_PATH }}" `
            --configuration ${{ env.BUILD_CONFIGURATION }} `
            --no-restore

      - name: 💯 Run unit tests
        timeout-minutes: 3
        run: |
          dotnet test `
            --project "${{ env.PROJECT_TESTS_PATH }}" `
            --configuration ${{ env.BUILD_CONFIGURATION }} `
            --no-restore `
            --no-build `
            --no-ansi `
            --no-progress `
            --output detailed

  build_msix:
    name: 📦 Build MS Store and Standalone
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    # TODO: Change back when Windows 2025 with VS2026 is available. (4 May 2026)
    #runs-on: windows-latest
    runs-on: windows-2025-vs2026
    environment: Production
    permissions:
      contents: read

    steps:
      - *step_checkout
      - *step_compare_versions
      - *step_setup_dotnet
      - *step_setup_msbuild
      - *step_restore_nuget

      # NUGET PACKAGE START
      #
      # Build the NuGet package and use it to build the sample project.
      #
      - name: 🧳 Pack NuGet package
        run: |
          # pack => .\artifacts\package\release\LicenseManager_12noon.Client.1.2.3.4.nupkg
          # No need to use --include-symbols because it is specified in the project file.
          dotnet pack `
            "${{ env.PROJECT_NUGET_PATH }}" `
            --configuration ${{ env.BUILD_CONFIGURATION }} `
            --no-restore `
            --output "${{ env.PUBLISH_FILES_PATH }}"

      - name: 🔍 Display NuGet Manifest (.nuspec)
        shell: pwsh
        run: |
          $packageItem = Get-ChildItem $env:PUBLISH_FILES_PATH_LINUX -Filter *.nupkg | Select-Object -First 1
          Write-Host "Package name: $($packageItem.Name)"
          Get-ChildItem $env:PUBLISH_FILES_PATH_LINUX
          mkdir temp
          Copy-Item -Path $packageItem.FullName -Destination ./temp/
          Set-Location temp
          Get-ChildItem
          Rename-Item -Path $packageItem.Name -NewName ($packageItem.Name + '.zip')
          Get-ChildItem
          Write-Host "unzip $($packageItem.Name).zip"
          Expand-Archive -Path ($packageItem.Name + '.zip') -DestinationPath ./
          Get-ChildItem
          Get-Content *.nuspec
          Set-Location ..

      - name: 🧩 Install NuGet package locally (not to the NuGet Gallery)
        run: |
          dotnet new nugetconfig --force
          dotnet nuget add source `
            "${{ env.PUBLISH_FILES_PATH }}" `
            --name LocalPackages `
            --configfile nuget.config
          dotnet nuget list source
          dotnet list "${{ env.PROJECT_EXAMPLE_PATH }}" package

      - name: 📙️ Build Example Client application
        run: |
          dotnet restore `
            "${{ env.PROJECT_EXAMPLE_PATH }}" `
            --runtime win-x64 `
            --configfile nuget.config
          dotnet build `
            "${{ env.PROJECT_EXAMPLE_PATH }}" `
            --configuration ${{ env.BUILD_CONFIGURATION }} `
            --no-restore
      #
      # NUGET PACKAGE END

      - name: 📁 Publish standalone app
        run: |
          $commonArgs = @(
            '--configuration', '${{ env.BUILD_CONFIGURATION }}',
            '--no-restore',
            '--property:Platform=x64',
            '--property:RuntimeIdentifier=win-x64',
            '--property:PublishProtocol=FileSystem',
            '--property:SelfContained=false',
            '--property:PublishReadyToRun=false',
            '--property:PublishTrimmed=false',
            '--property:PublishSingleFile=true',
            '--property:PublishDir="${{ env.PUBLISH_FILES_PATH }}\local"'
          )
          dotnet publish @commonArgs "${{ env.PROJECT_APP_PATH }}"
          dotnet publish @commonArgs "${{ env.PROJECT_EXAMPLE_PATH }}"
          dotnet publish @commonArgs "${{ env.PROJECT_CONSOLE_PATH }}"

      - name: 📂 Copy application license files (.lic and .private) to deployment folder
        run: |
          Copy-Item -Destination "${{ env.PUBLISH_FILES_PATH }}\local" -Path "${{ env.LICENSE_FILE_PATH }}"
          Copy-Item -Destination "${{ env.PUBLISH_FILES_PATH }}\local" -Path "${{ env.PRIVATE_FILE_PATH }}"

      - name: 📦 Zip and delete standalone folder
        working-directory: ${{ env.PUBLISH_FILES_PATH_LINUX }}
        shell: pwsh
        run: |
          Compress-Archive -Path "local/*" -DestinationPath "${{env.ARTIFACT_NAME}}.zip" -Force
          Remove-Item "local" -Recurse -Force

      # LicenseManagerX_Package_#.##.###.0_x64_bundle.msixupload
      - name: 🪟 Build MSIX bundle (.msixupload) for Microsoft Store
        run: |
          msbuild `
            "${{ env.PROJECT_WAP_PATH }}" `
            -property:Configuration=${{ env.BUILD_CONFIGURATION }} `
            -property:Platform=x64 `
            -property:UapAppxPackageBuildMode=StoreUpload `
            -property:AppxPackageDir="${{ env.PUBLISH_FILES_PATH }}" `
            -verbosity:quiet

      - name: ❌ Delete unwanted files from deployment folder
        run: |
          Remove-Item -Force -ErrorAction SilentlyContinue -Recurse -Path "${{ env.PUBLISH_FILES_PATH }}\*_Package_*_Test"

      - name: 📂 Copy extra files to deployment folder
        run: |
          Copy-Item -Destination "${{ env.PUBLISH_FILES_PATH }}" -Path LICENSE

      - name: 📤 Upload deployment folder
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_PACKAGE }}
          path: ${{ env.PUBLISH_FILES_PATH }}
          if-no-files-found: error
          retention-days: 1

  #
  # Production release must be on 'main' and the tag must begin with 'v'.
  # If a release already exists, do not create the release.
  #
  # Manual dispatch must build but must not create a release.
  #
  # NORMAL -- make a bunch of commits and then push:
  # If this is a push without a version tag, build but do not create a release.
  #
  # TEST -- on a different branch, such as "yaml," create a tag and then push it:
  # If this is a push elsewhere with a v1.2.3 tag, create a DRAFT release for GitHub and no NuGet release.
  #
  # RELEASE -- create tag and push it:
  # If this is a push on `main` of a v1.2.3 tag, create a PRODUCTION release for GitHub and NuGet.
  #
  # • Manual dispatch: Only the build job runs, no release is created.
  # • Normal push (no tag): Only the build job runs, no release is created.
  # • Tag push on other branch: Both build and release jobs run, draft release, no NuGet publish.
  # • Tag push on main: Both build and release jobs run, production release and NuGet publish.
  #
  # | Scenario        | Build | Build MSIX | Release Job | Release Type | NuGet Publish | Notes               |
  # |-----------------|-------|------------|-------------|--------------|---------------|---------------------|
  # | Normal (no tag) | Yes   | No         | No          | N/A          | No            | Only build          |
  # | Manual dispatch | Yes   | No         | No          | N/A          | No            | Only build          |
  # | Test (other br) | Yes   | Yes        | Yes         | Draft        | No            | Tag on other branch |
  # | Release (main)  | Yes   | Yes        | Yes         | Production   | Yes           | Tag on main         |
  #
  release:
    name: 🚀 Create GitHub release
    # We require the 'build' job because it runs unit tests.
    needs: [ build, build_msix]
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🧾 Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 📥 Download deployment folder as a build artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.ARTIFACT_PACKAGE }}
          path: ${{ env.PUBLISH_FILES_PATH_LINUX }}

      - name: 🗒️ List folder
        run: ls -la "${{ env.PUBLISH_FILES_PATH_LINUX }}"

      - name: 🏷️ Get short SHA of the tag
        id: tag_sha
        run: |
          short_sha=$(git rev-parse --short HEAD)
          echo "short_sha=$short_sha" >> $GITHUB_OUTPUT
          echo "short_sha=$short_sha"

      # If the workflow was inititated by pushing a tag,
      # we need to know if it is on the 'main' branch.
      - name: 🧪 Check if tag is on main
        id: tag_on_main
        run: |
          # -n : non-empty, -z : unset or empty
          BASE_BRANCH=$(git branch -r --contains $GITHUB_SHA | grep 'main' || true)
          if [[ -n "$BASE_BRANCH" ]]; then
            echo "on_main=true" >> $GITHUB_OUTPUT
            echo "on_main=true"
          else
            echo "on_main=false" >> $GITHUB_OUTPUT
            echo "on_main=false"
          fi

      - name: 🏷️ Get version tag and release name
        id: get_version
        run: |
          # Use the version tag
          tag="${GITHUB_REF##*/}"   # e.g., refs/tags/v1.2.3 -> v1.2.3
          name="${tag#v}"           # Remove 'v' prefix if present, e.g., v1.2.3 -> 1.2.3
          # If not on `main` branch, append short SHA for test releases
          if [[ "${{ steps.tag_on_main.outputs.on_main }}" != "true" ]]; then
            name="${name}-${{ steps.tag_sha.outputs.short_sha }}"
          fi
          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "name=$name" >> $GITHUB_OUTPUT
          echo "tag=$tag"
          echo "name=$name"

      # Create a release only if one does not already exist for this tag.
      # We now check by *tag* instead of by name because:
      # - The tag (e.g., "v1.2.3") is guaranteed unique in Git.
      # - The release name (e.g., "1.2.3") differs only by the "v" prefix.
      # - Our workflow enforces a strict 1:1 mapping between version → tag → release.
      # - We no longer create multiple test releases with different tags for the same version.
      # Therefore, a direct lookup by tag is the most reliable and deterministic check.
      # https://github.com/marketplace/actions/github-script
      - name: 🧪 Check if release exists with the same tag
        id: release_exists
        uses: actions/github-script@v9
        with:
          result-encoding: string
          script: |
            const tag  = '${{ steps.get_version.outputs.tag }}';
            const name = '${{ steps.get_version.outputs.name }}';
            try
            {
              await github.rest.repos.getReleaseByTag(
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              console.log(`Release "${name}" for tag ${tag} already exists. Skipping creating a release.`);
              return true;
            }
            catch (error)
            {
              if (error.status === 404)
              {
                // No release exists for this tag
                return false;
              }
              // Any other error is a real failure
              throw error;
            }

      # Create the GitHub Release for this version.
      # The release tag (e.g., "v1.2.3") is the canonical identifier and is guaranteed unique.
      # The release name (e.g., "1.2.3") differs only by the "v" prefix but still maps 1:1 to the tag.
      # Since we now check for existing releases by tag, this step only runs when no release exists
      # for the version produced by get_version.
      # https://github.com/marketplace/actions/gh-release
      - name: 🚀 Create GitHub Release
        if: ${{ steps.release_exists.outputs.result != 'true' }}
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name:     ${{ steps.get_version.outputs.name }}
          make_latest: ${{ steps.tag_on_main.outputs.on_main == 'true' }}
          draft:       ${{ steps.tag_on_main.outputs.on_main != 'true' }}
          # There is also a `prerelease` property. (Example: if manual start, which implies no v tag)
          #prerelease: ${{ github.event_name == 'workflow_dispatch' }}
          #
          # Note: To encourage installations from the Microsoft Store, do not upload build targets.
          #files: ${{ env.PUBLISH_FILES_PATH_LINUX }}/*
          generate_release_notes: true
          append_body: true
          body: |
            <p><a href="https://apps.microsoft.com/detail/9PFBGG44SHLM?referrer=appbadge&mode=direct">
              <img src="https://get.microsoft.com/images/en-us%20dark.svg" width="200"/>
            </a></p>

      - name: 🗒️ Output release info
        if: ${{ steps.release_exists.outputs.result != 'true' }}
        run: |
          echo "Release ${{ steps.get_version.outputs.name }} created on tag ${{ steps.get_version.outputs.tag }}"

      # https://learn.microsoft.com/en-us/nuget/nuget-org/publish-a-package
      # Publish NuGet package to nuget.org if this is a version tag on the main branch
      - name: 🚀 Publish NuGet package
        if: ${{ steps.tag_on_main.outputs.on_main == 'true' }}
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.API_KEY_NUGET }}
        run: |
          # NuGet.org
          # --skip-duplicate prevents an error if this package version already exists.
          # It cannot overwrite an existing package with the same version.
          # Pushing the .nupkg file automatically pushes the associated .snupkg file.
          dotnet nuget push "${{ env.PUBLISH_FILES_PATH_LINUX }}/*.nupkg" \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "$NUGET_AUTH_TOKEN" \
            --skip-duplicate
          # GitHub Packages
          #dotnet nuget push "${{ env.PUBLISH_FILES_PATH_LINUX }}/*.nupkg"  --api-key ${{ secrets.TOKEN_PACKAGES }} --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --skip-duplicate
          #dotnet nuget push "${{ env.PUBLISH_FILES_PATH_LINUX }}/*.snupkg" --api-key ${{ secrets.TOKEN_PACKAGES }} --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --skip-duplicate

  #
  # https://docs.github.com/en/actions/how-tos/writing-workflows/choosing-when-your-workflow-runs/using-conditions-to-control-job-execution
  # "A job that is skipped will report its status as "Success"."
  # https://docs.github.com/en/actions/how-tos/writing-workflows/choosing-what-your-workflow-does/using-jobs-in-a-workflow
  # "If a job fails or is skipped, all jobs that need it are skipped unless
  #  the jobs use a conditional expression that causes the job to continue."
  #
  cleanup:
    name: 🧹 Clean up artifacts
    needs: release
    if: ${{ always() }}
    runs-on: ubuntu-latest

    steps:
      # Delete publish artifact so it does not count against storage
      # https://github.com/marketplace/actions/delete-artifact
      - name: ❌ Delete build artifact
        uses: GeekyEggo/delete-artifact@v6
        with:
          name: ${{ env.ARTIFACT_PACKAGE }}
          failOnError: false
